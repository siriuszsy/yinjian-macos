name: voiceKey

options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: voiceKey/Support/Signing.xcconfig
  Release: voiceKey/Support/Signing.xcconfig

settings:
  base:
    PRODUCT_NAME: voiceKey
    PRODUCT_BUNDLE_IDENTIFIER: com.littlerobot.voicekey
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic

targets:
  voiceKey:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: voiceKey
        excludes:
          - Resources
          - voiceKeyTests
    resources:
      - path: voiceKey/Resources
    info:
      path: voiceKey/Support/Info.plist
      properties:
        CFBundleName: 音键
        CFBundleDisplayName: 音键
        LSUIElement: true
        NSMicrophoneUsageDescription: 音键需要麦克风权限来采集语音输入。
    settings:
      base:
        INFOPLIST_FILE: voiceKey/Support/Info.plist
        PRODUCT_MODULE_NAME: voiceKey

  voiceKeyTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: voiceKeyTests
    dependencies:
      - target: voiceKey
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: voiceKeyTests
        PRODUCT_MODULE_NAME: voiceKeyTests
        PRODUCT_BUNDLE_IDENTIFIER: com.littlerobot.voicekeyTests
